<header>
 <h1>🧫🐛 Organoid Creature — Gamification Demos</h1>
 <div class="sub">Six directions, one engine. Switch modes to compare which foraging-brain game has the most legs.</div>
</header>
<div id="tabs"></div>
<div id="body">
 <canvas id="arena"></canvas>
 <div id="panel"></div>
</div></div>
<script src="brain.js"></script>
<script>
// ============================================================================
// SHARED ENGINE — a tiny embodied creature with a small rate-coded brain.
// Kept intentionally simple so all six game modes stay fast and comparable.
// Brain: 3 sensors (leftFood, rightFood, wall) -> 2 motors (left, right).
// Genome = 6 weights + 2 biases. Behavior is emergent; it can be evolved/trained.
// ============================================================================
const A = document.getElementById('arena'), ac = A.getContext('2d');
const panel = document.getElementById('panel'), tabsEl = document.getElementById('tabs');
function resize(){ A.width = A.clientWidth; A.height = A.clientHeight; }
addEventListener('resize', resize);
const rnd = (a,b)=>a+Math.random()*(b-a);
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));

function randomGenome(){
  return { w:[rnd(-1,1),rnd(-1,1),rnd(-1,1),rnd(-1,1),rnd(-1,1),rnd(-1,1)], b:[rnd(-.3,.3),rnd(-.3,.3)] };
}
// A hand-picked genome that forages competently, used as a baseline.
function goodGenome(){ return { w:[ 0.1, 1.2, 1.2, 0.1, -0.9, 0.9 ], b:[0.15,0.15] }; }

function makeCreature(genome){
  return { x:0.5, y:0.5, h:rnd(0,6.28), energy:100, alive:true, score:0, genome:genome||goodGenome(),
           mL:0, mR:0, speed:0, wallTime:0, turnSum:0, ticks:0, dead:false, born:performance.now() };
}
// sensors relative to nearest food
function senseFood(c, food){
  let bd=1e9, bi=-1;
  for(let i=0;i<food.length;i++){ const dx=food[i].x-c.x, dy=food[i].y-c.y, d=dx*dx+dy*dy; if(d<bd){bd=d;bi=i;} }
  let L=0,R=0;
  if(bi>=0){
    const dx=food[bi].x-c.x, dy=food[bi].y-c.y;
    const ang=Math.atan2(dy,dx)-c.h;
    const a=Math.atan2(Math.sin(ang),Math.cos(ang));
    const prox=Math.max(0,1-Math.sqrt(bd)/0.6);
    if(a>0) L=prox*(1+Math.cos(a)); else R=prox*(1+Math.cos(a));
    L=Math.min(1,L); R=Math.min(1,R);
  }
  const wall=Math.max(0,1-Math.min(c.x,c.y,1-c.x,1-c.y)/0.15);
  return [L,R,wall];
}
// one brain+body tick. opts: sensorGain, motorGain, turnBias, stim(bool), lesion(0/1 mult)
function stepCreature(c, food, opts){
  opts=opts||{};
  const sg=opts.sensorGain==null?1:opts.sensorGain;
  const mg=opts.motorGain==null?1:opts.motorGain;
  const tb=opts.turnBias||0;
  const les=opts.lesion==null?1:opts.lesion;
  let [L,R,W]=senseFood(c,food);
  L*=sg; R*=sg; W*=sg;
  const g=c.genome;
  // motors
  let mL = Math.tanh(g.w[0]*L + g.w[1]*R + g.w[4]*W + g.b[0]) * les;
  let mR = Math.tanh(g.w[2]*L + g.w[3]*R + g.w[5]*W + g.b[1]) * les;
  if(opts.stim){ mL+=0.4; mR+=0.4; }
  mL=Math.max(0,mL); mR=Math.max(0,mR);
  c.mL=mL; c.mR=mR;
  const speed=(0.0025 + 0.010*(mL+mR)/2)*mg;
  c.speed=speed;
  c.h += (mL-mR)*0.9*mg + (W>0.3?0.05:0) + tb;
  c.x=clamp(c.x+Math.cos(c.h)*speed,0.03,0.97);
  c.y=clamp(c.y+Math.sin(c.h)*speed,0.03,0.97);
  c.turnSum+=Math.abs(mL-mR); c.ticks++;
  if(W>0.3) c.wallTime++;
  return {L,R,W};
}
function eatCheck(c, food, onEat){
  for(let i=food.length-1;i>=0;i--){
    const dx=food[i].x-c.x, dy=food[i].y-c.y;
    if(dx*dx+dy*dy<0.001){ food.splice(i,1); c.score++; c.energy=Math.min(100,c.energy+25); if(onEat)onEat(); food.push(spawnFood()); }
  }
}
function spawnFood(){ return {x:rnd(0.06,0.94), y:rnd(0.06,0.94)}; }
function drawBody(c, w, h, color){
  ac.save(); ac.translate(c.x*w,c.y*h); ac.rotate(c.h);
  ac.fillStyle=color||(c.alive?'#ffd24d':'#5a6b80');
  ac.beginPath(); ac.moveTo(10,0); ac.lineTo(-6,5); ac.lineTo(-6,-5); ac.closePath(); ac.fill(); ac.restore();
}
function drawFood(food, w, h, color){
  ac.fillStyle=color||'#3ddc84';
  for(const f of food){ ac.beginPath(); ac.arc(f.x*w,f.y*h,4,0,6.283); ac.fill(); }
}
function frameClear(){ const w=A.width,h=A.height; ac.clearRect(0,0,w,h); ac.strokeStyle='#1c2b3d'; ac.strokeRect(2,2,w-4,h-4); return [w,h]; }
function energyBar(c,w){ const bw=w-24,e=clamp(c.energy/100,0,1); ac.fillStyle='#132030'; ac.fillRect(12,10,bw,8); ac.fillStyle=e>0.5?'#3ddc84':e>0.25?'#ffd24d':'#ff5a5a'; ac.fillRect(12,10,bw*e,8); }

// mutate genome for evolution
function mutate(g, rate){
  const n={w:g.w.slice(),b:g.b.slice()};
  for(let i=0;i<n.w.length;i++) if(Math.random()<0.6) n.w[i]=clamp(n.w[i]+rnd(-rate,rate),-2,2);
  for(let i=0;i<n.b.length;i++) if(Math.random()<0.6) n.b[i]=clamp(n.b[i]+rnd(-rate,rate),-1,1);
  return n;
}

// ============================================================================
// FULL-BRAIN CREATURE  (used by the Evolution mode only; other modes keep the
// fast rate-coded stub above). Same {x,y,h,score} interface as makeCreature so
// drawBody/drawFood still work — but the "brain" is a real spiking organoid from
// brain.js (Izhikevich · Dale · reward-gated STDP · homeostasis · metabolism),
// just small (N=120). Body coupling constants are scaled up because a small
// network's motor signals are correct but tiny.
// ============================================================================
const FB_TWEAKS={N:120,injMult:30,reflexScale:6};
const FB_SPEED_BASE=0.0018, FB_SPEED_GAIN=0.5, FB_TURN=10;
function makeFullCreature(genome){
  const g = Object.assign(genome || BrainKit.randomGenome(), FB_TWEAKS);
  return { x:0.5, y:0.5, h:rnd(0,6.28), hv:0, energy:100, tired:0, alive:true, score:0, speed:0,
           genome:g, brain:new Brain(g) };
}
// two-antenna smell + wall + food-distance + hunger + fatigue → the 6 senses the brain expects
function senseFull(c, food){
  let L=0,R=0,nr=1e9;
  for(const f of food){ const dx=f.x-c.x, dy=f.y-c.y, d=Math.hypot(dx,dy); if(d<nr)nr=d;
    const r=d/0.35, it=1/(1+r*r), ang=Math.atan2(dy,dx)-c.h, a=Math.atan2(Math.sin(ang),Math.cos(ang));
    L+=it*Math.max(0,Math.cos(a-0.6)); R+=it*Math.max(0,Math.cos(a+0.6)); }
  L=1-Math.exp(-L); R=1-Math.exp(-R);
  const wall=Math.max(0,1-Math.min(c.x,c.y,1-c.x,1-c.y)/0.15);
  const fc=food.length?1/(1+(nr/0.3)**2):0;
  return [L,R,wall,fc,1-c.energy/100,Math.min(1,c.tired)];
}
function stepFull(c, food){
  const Mg=c.genome.motorGain;
  const s=senseFull(c,food);
  const [mL,mR]=c.brain.step(s);
  const fwd=(mL+mR)/2; let sp=FB_SPEED_BASE+FB_SPEED_GAIN*fwd*Mg; if(sp<0)sp=0; if(sp>0.02)sp=0.02;
  const tc=Math.atan2(0.5-c.y,0.5-c.x), dh=Math.atan2(Math.sin(tc-c.h),Math.cos(tc-c.h));
  c.hv=c.hv*0.75+((mL-mR)*FB_TURN*Mg+dh*s[2]*0.3)*0.25; c.h+=c.hv;
  c.x=clamp(c.x+Math.cos(c.h)*sp,0.03,0.97); c.y=clamp(c.y+Math.sin(c.h)*sp,0.03,0.97);
  c.speed=sp;
  for(let i=food.length-1;i>=0;i--){ const dx=food[i].x-c.x, dy=food[i].y-c.y;
    if(dx*dx+dy*dy<0.001){ food.splice(i,1); c.score++; c.energy=Math.min(100,c.energy+25);
      c.tired=Math.max(0,c.tired-0.04); food.push(spawnFood()); c.brain.reward(0.85); } }
  c.energy=Math.max(0,c.energy-(0.03+2.0*sp+400*sp*sp)); // drains (feeds hunger sense) but no death in evo
  c.tired=Math.max(0,Math.min(1,c.tired+sp*3-0.008));
}

// ============================================================================
// MODE FRAMEWORK
// ============================================================================
let current=null, raf=null;
const modes={};
function setMode(key){
  if(raf) cancelAnimationFrame(raf);
  current=modes[key];
  [...tabsEl.children].forEach(t=>t.classList.toggle('on', t.dataset.k===key));
  panel.innerHTML=''; A.onclick=null; A.onmousemove=null;
  resize(); current.init();
  loop();
}
function loop(){ current.step(); current.draw(); raf=requestAnimationFrame(loop); }

// ---------------------------------------------------------------------------
// 1. SURVIVAL & PROGRESSION
// ---------------------------------------------------------------------------
modes.survival = (()=>{
  let c, food, toxins, best=0, t0, difficulty;
  function init(){
    c=makeCreature(goodGenome()); food=[]; for(let i=0;i<5;i++)food.push(spawnFood());
    toxins=[]; t0=performance.now(); difficulty=0;
    panel.innerHTML=`<div class="mname">1 · Survival & Progression</div>
     <div class="mdesc">The classic loop: forage to stay alive while it gets harder. Red toxins spawn faster over time. Click the arena to drop food.</div>
     <div class="vit"><span class="vk">Survival</span><span class="vv" id="s_surv">0s</span></div>
     <div class="vit"><span class="vk">Best</span><span class="vv" id="s_best">0s</span></div>
     <div class="vit"><span class="vk">Food eaten</span><span class="vv" id="s_score">0</span></div>
     <div class="vit"><span class="vk">Energy</span><span class="vv" id="s_nrg">100</span></div>
     <div class="vit"><span class="vk">Difficulty</span><span class="vv" id="s_diff">0</span></div>
     <button id="s_reset">Respawn</button>
     <div class="potential">Potential: <span class="star">★★★☆☆</span> — instantly readable, but the brain is just scenery. The player isn't really engaging the neural angle.</div>
     <div class="hint">Try to keep it alive by feeding it. Watch it swerve away from walls on its own.</div>`;
    document.getElementById('s_reset').onclick=init;
    A.onclick=ev=>{ const r=A.getBoundingClientRect(); food.push({x:(ev.clientX-r.left)/A.width,y:(ev.clientY-r.top)/A.height}); };
  }
  function step(){
    if(!c.alive) return;
    difficulty=(performance.now()-t0)/1000/20;
    stepCreature(c,food,{});
    eatCheck(c,food);
    // toxin dynamics
    if(Math.random()<0.004+difficulty*0.01 && toxins.length<40) toxins.push(spawnFood());
    for(let i=toxins.length-1;i>=0;i--){ const dx=toxins[i].x-c.x,dy=toxins[i].y-c.y; if(dx*dx+dy*dy<0.0012){ c.energy-=18; toxins.splice(i,1); } }
    c.energy -= 0.03 + c.speed*3 + difficulty*0.02;
    if(c.energy<=0){ c.alive=false; best=Math.max(best,(performance.now()-t0)/1000); }
  }
  function draw(){
    const [w,h]=frameClear();
    ac.fillStyle='#ff5a5a'; for(const t of toxins){ ac.beginPath(); ac.arc(t.x*w,t.y*h,4,0,6.283); ac.fill(); }
    drawFood(food,w,h); drawBody(c,w,h); energyBar(c,w);
    const surv=c.alive?(performance.now()-t0)/1000:best;
    document.getElementById('s_surv').textContent=surv.toFixed(1)+'s';
    document.getElementById('s_best').textContent=best.toFixed(1)+'s';
    document.getElementById('s_score').textContent=c.score;
    document.getElementById('s_nrg').textContent=Math.max(0,Math.round(c.energy));
    document.getElementById('s_diff').textContent=difficulty.toFixed(1);
    if(!c.alive){ ac.fillStyle='rgba(5,8,13,0.7)'; ac.fillRect(0,0,w,h); ac.fillStyle='#ff8a63'; ac.font='bold 24px system-ui'; ac.textAlign='center'; ac.fillText('💀 starved',w/2,h/2-8); ac.fillStyle='#eaf1fb'; ac.font='15px system-ui'; ac.fillText('survived '+best.toFixed(1)+'s · Respawn',w/2,h/2+18); ac.textAlign='left'; }
  }
  return {init,step,draw};
})();

// ---------------------------------------------------------------------------
// 2. EVOLUTION / BREEDING
// ---------------------------------------------------------------------------
modes.evolution = (()=>{
  let pop, food, gen, genTime, GEN_LEN=650, best=0, hist, mutRate;
  const POP=14, SUB=2; // SUB = brain ticks simulated per animation frame
  function init(){
    pop=[]; for(let i=0;i<POP;i++) pop.push(makeFullCreature());
    food=[]; for(let i=0;i<10;i++)food.push(spawnFood());
    gen=1; genTime=0; best=0; hist=[]; mutRate=0.3;
    panel.innerHTML=`<div class="mname">2 · Evolution / Breeding</div>
     <div class="mdesc">${POP} creatures forage the same arena — each is a real spiking organoid brain (Izhikevich · Dale · reward-gated STDP · homeostasis · metabolism), just small (N=120). Each generation the best breed with mutation; wiring and parameters are inherited. Watch competence emerge from noise.</div>
     <div class="vit"><span class="vk">Generation</span><span class="vv" id="e_gen">1</span></div>
     <div class="vit"><span class="vk">Best fitness ever</span><span class="vv" id="e_best">0</span></div>
     <div class="vit"><span class="vk">Gen leader</span><span class="vv" id="e_lead">0</span></div>
     <div class="lab">Mutation rate <span class="val" id="e_mv">0.30</span></div><input type="range" id="e_mr" min="2" max="80" value="30">
     <button id="e_skip">Force next generation</button>
     <canvas id="e_chart" width="276" height="70" style="margin-top:8px;background:#04070c;border:1px solid #16202e;border-radius:4px;display:block"></canvas>
     <div class="potential">Potential: <span class="star">★★★★★</span> — mesmerizing and unique. The payoff (dumb → smart) is the whole pitch of "biological computing" made visible — now with genuinely neural creatures.</div>
     <div class="hint">Bright = well-fed, dim = struggling. Fitness = food eaten this generation. Full brains are heavier than the stub, so each generation takes a moment.</div>`;
    document.getElementById('e_mr').oninput=e=>{ mutRate=+e.target.value/100; document.getElementById('e_mv').textContent=mutRate.toFixed(2); };
    document.getElementById('e_skip').onclick=()=>{ genTime=GEN_LEN; };
  }
  function nextGen(){
    pop.sort((a,b)=>b.score-a.score);
    best=Math.max(best,pop[0].score);
    hist.push(pop[0].score); if(hist.length>60)hist.shift();
    const parents=pop.slice(0,4);
    const np=[];
    np.push(makeFullCreature(parents[0].genome));                       // keep champion's genome
    for(let i=1;i<POP;i++){ const p=parents[Math.floor(Math.random()*parents.length)];
      np.push(makeFullCreature(BrainKit.mutate(p.genome, mutRate))); }  // breed with mutation
    pop=np; gen++; genTime=0;
    food=[]; for(let i=0;i<10;i++)food.push(spawnFood());
  }
  function step(){
    genTime++;
    for(let s=0;s<SUB;s++){ for(const c of pop) stepFull(c,food); }
    if(genTime>=GEN_LEN) nextGen();
  }
  function draw(){
    const [w,h]=frameClear();
    drawFood(food,w,h);
    let lead=0;
    for(const c of pop){ const bright=clamp(0.3+c.score*0.12,0.3,1); drawBody(c,w,h,`rgba(255,210,77,${bright})`); lead=Math.max(lead,c.score); }
    document.getElementById('e_gen').textContent=gen;
    document.getElementById('e_best').textContent=best;
    document.getElementById('e_lead').textContent=lead;
    // progress bar of generation
    ac.fillStyle='#132030'; ac.fillRect(12,10,w-24,5); ac.fillStyle='#5aa8ff'; ac.fillRect(12,10,(w-24)*genTime/GEN_LEN,5);
    const ch=document.getElementById('e_chart'); if(ch){ const cc=ch.getContext('2d'); cc.clearRect(0,0,ch.width,ch.height); const mx=Math.max(3,...hist); cc.strokeStyle='#3ddc84'; cc.beginPath(); hist.forEach((v,i)=>{ const x=i/Math.max(1,hist.length-1)*ch.width, y=ch.height-(v/mx)*(ch.height-6)-3; i?cc.lineTo(x,y):cc.moveTo(x,y); }); cc.stroke(); cc.fillStyle='#6a7c93'; cc.font='9px system-ui'; cc.fillText('best fitness / gen',4,10); }
  }
  return {init,step,draw};
})();

// ---------------------------------------------------------------------------
// 3. TRAIN YOUR DISH
// ---------------------------------------------------------------------------
modes.train = (()=>{
  let c, target, reward, learnRate, reaches, t0, learned, lastDist, baseGenome;
  function newTarget(){ target={x:rnd(0.15,0.85),y:rnd(0.15,0.85)}; }
  function init(){
    c=makeCreature(randomGenome()); newTarget(); reward=0; learnRate=0.25; reaches=0; t0=performance.now(); learned=null; lastDist=1;
    panel.innerHTML=`<div class="mname">3 · Train Your Dish</div>
     <div class="mdesc">DishBrain premise: you don't program the creature, you only reward it. Reward-modulated learning nudges a random brain until it reliably reaches the target. Score = time to competence.</div>
     <div class="vit"><span class="vk">Targets reached</span><span class="vv" id="t_reach">0</span></div>
     <div class="vit"><span class="vk">Time elapsed</span><span class="vv" id="t_time">0s</span></div>
     <div class="vit"><span class="vk">Learned at</span><span class="vv" id="t_learned">—</span></div>
     <div class="lab">Learning rate <span class="val" id="t_lv">0.25</span></div><input type="range" id="t_lr" min="0" max="100" value="25">
     <label style="display:flex;align-items:center;margin-top:6px;cursor:pointer"><input type="checkbox" id="t_auto" checked style="margin-right:6px">Auto-reward (progress toward target)</label>
     <button id="t_reward">💧 Manual reward pulse</button>
     <button id="t_reset">New random brain</button>
     <div class="potential">Potential: <span class="star">★★★★☆</span> — the most "real" to the science and genuinely satisfying, but learning can stall; needs a forgiving reward signal to feel fair.</div>
     <div class="hint">Blue ring = target. Reward fires when it moves closer. A learned brain reaches ~5 targets quickly.</div>`;
    document.getElementById('t_lr').oninput=e=>{ learnRate=+e.target.value/100; document.getElementById('t_lv').textContent=learnRate.toFixed(2); };
    document.getElementById('t_reward').onclick=()=>{ reward=1; };
    document.getElementById('t_reset').onclick=init;
  }
  let explore={w:[0,0,0,0,0,0],b:[0,0]};
  function perturb(){ for(let i=0;i<6;i++)explore.w[i]=rnd(-1,1); for(let i=0;i<2;i++)explore.b[i]=rnd(-1,1); }
  function step(){
    // steer creature toward target by treating target as the only food
    const food=[target];
    const dx=target.x-c.x, dy=target.y-c.y, dist=Math.sqrt(dx*dx+dy*dy);
    stepCreature(c,food,{});
    // node-perturbation style reward learning: apply small exploratory weights, keep if rewarded
    if(c.ticks%30===0) perturb();
    const auto=document.getElementById('t_auto') && document.getElementById('t_auto').checked;
    if(auto && dist<lastDist-0.0005) reward=Math.max(reward,0.6);
    if(reward>0.01){
      const g=c.genome; const lr=learnRate*0.08*reward;
      for(let i=0;i<6;i++) g.w[i]=clamp(g.w[i]+explore.w[i]*lr,-2,2);
      for(let i=0;i<2;i++) g.b[i]=clamp(g.b[i]+explore.b[i]*lr,-1,1);
      reward*=0.9;
    }
    lastDist=dist;
    if(dist<0.05){ reaches++; reward=1; newTarget(); lastDist=1; if(reaches>=5 && !learned) learned=(performance.now()-t0)/1000; }
  }
  function draw(){
    const [w,h]=frameClear();
    ac.strokeStyle='#5aa8ff'; ac.lineWidth=2; ac.beginPath(); ac.arc(target.x*w,target.y*h,10,0,6.283); ac.stroke(); ac.lineWidth=1;
    ac.fillStyle='#5aa8ff'; ac.beginPath(); ac.arc(target.x*w,target.y*h,3,0,6.283); ac.fill();
    drawBody(c,w,h);
    // reward flash
    if(reward>0.05){ ac.fillStyle=`rgba(61,220,132,${reward*0.25})`; ac.fillRect(0,0,w,h); }
    document.getElementById('t_reach').textContent=reaches;
    document.getElementById('t_time').textContent=((performance.now()-t0)/1000).toFixed(1)+'s';
    document.getElementById('t_learned').textContent=learned?learned.toFixed(1)+'s ✓':'—';
  }
  return {init,step,draw};
})();

// ---------------------------------------------------------------------------
// 4. SANDBOX / GOD MODE
// ---------------------------------------------------------------------------
modes.sandbox = (()=>{
  let c, food, nodes, dop, tool;
  function init(){
    c=makeCreature(goodGenome()); food=[]; for(let i=0;i<6;i++)food.push(spawnFood());
    dop=0; tool='stim';
    // 5 abstract "brain nodes" the player can poke: [Lsens,Rsens,Wall,Lmotor,Rmotor]
    nodes=[{n:'L-sense',x:0.2,act:0,dead:false},{n:'R-sense',x:0.35,act:0,dead:false},{n:'Wall',x:0.5,act:0,dead:false},{n:'L-motor',x:0.65,act:0,dead:false},{n:'R-motor',x:0.8,act:0,dead:false}];
    panel.innerHTML=`<div class="mname">4 · Sandbox / God Mode</div>
     <div class="mdesc">A neural "SimCity". Poke the brain and watch behavior change. Click a node in the strip below the arena to stimulate or lesion it; inject dopamine to boost plasticity/vigor.</div>
     <button id="b_stim" class="">🔌 Tool: Stimulate</button>
     <button id="b_les">✂️ Tool: Lesion</button>
     <button id="b_dop">💧 Inject dopamine</button>
     <button id="b_reset">Reset brain</button>
     <div class="vit"><span class="vk">Dopamine</span><span class="vv" id="b_dopv">0.00</span></div>
     <div class="vit"><span class="vk">Food eaten</span><span class="vv" id="b_score">0</span></div>
     <div class="potential">Potential: <span class="star">★★★★☆</span> — great for tinkerers and teaching (lesion the L-motor, watch it circle). Open-ended, but no built-in goal.</div>
     <div class="hint">Lesion a motor and it spins. Lesion a sensor and it goes blind on one side. Dopamine makes it friskier.</div>`;
    const setTool=t=>{ tool=t; document.getElementById('b_stim').className=t==='stim'?'':''; };
    document.getElementById('b_stim').onclick=()=>{tool='stim'; markTool();};
    document.getElementById('b_les').onclick=()=>{tool='les'; markTool();};
    document.getElementById('b_dop').onclick=()=>{ dop=Math.min(2,dop+1); };
    document.getElementById('b_reset').onclick=init;
    function markTool(){ document.getElementById('b_stim').style.borderColor=tool==='stim'?'#2f7a4d':'#2c3a4d'; document.getElementById('b_les').style.borderColor=tool==='les'?'#2f7a4d':'#2c3a4d'; }
    markTool();
    A.onclick=ev=>{
      const r=A.getBoundingClientRect(), w=A.width,h=A.height;
      const mx=(ev.clientX-r.left), my=(ev.clientY-r.top);
      // node strip along bottom
      if(my>h-46){ for(const nd of nodes){ if(Math.abs(mx-nd.x*w)<26){ if(tool==='les') nd.dead=!nd.dead; else nd.act=1.2; } } }
      else { food.push({x:mx/w,y:my/h}); }
    };
  }
  function step(){
    dop*=0.99;
    // dead sensors zero out that input; dead motors zero that motor via lesion mult per-motor
    const les = (nodes[3].dead && nodes[4].dead)?0:1;
    stepCreature(c,food,{ stim: (nodes[3].act>0||nodes[4].act>0), motorGain:1+dop*0.5, lesion: les });
    // apply per-node lesion effects crudely for visualization + behavior
    if(nodes[3].dead && !nodes[4].dead) c.h+=0.06; // only right motor works -> curves
    if(nodes[4].dead && !nodes[3].dead) c.h-=0.06;
    eatCheck(c,food,()=>{dop=Math.min(2,dop+0.5);});
    c.energy=Math.min(100,c.energy+0.02);
    nodes[3].act*=0.9; nodes[4].act*=0.9;
    // reflect current activation
    const s=senseFood(c,food); nodes[0].act=Math.max(nodes[0].act,s[0]); nodes[1].act=Math.max(nodes[1].act,s[1]); nodes[2].act=Math.max(nodes[2].act,s[2]);
    nodes[0].act*=0.9; nodes[1].act*=0.9; nodes[2].act*=0.9;
  }
  function draw(){
    const [w,h]=frameClear();
    drawFood(food,w,h); drawBody(c,w,h);
    if(dop>0.05){ ac.fillStyle=`rgba(90,168,255,${dop*0.08})`; ac.fillRect(0,0,w,h); }
    // node strip
    ac.fillStyle='#0e1622'; ac.fillRect(0,h-46,w,46);
    for(const nd of nodes){
      const x=nd.x*w, y=h-24;
      ac.beginPath(); ac.arc(x,y,14,0,6.283);
      ac.fillStyle = nd.dead ? '#3a2530' : `rgba(90,168,255,${0.25+nd.act*0.75})`;
      ac.fill(); ac.strokeStyle=nd.dead?'#ff5a5a':'#2c3a4d'; ac.stroke();
      ac.fillStyle=nd.dead?'#ff8a63':'#8aa0bb'; ac.font='9px system-ui'; ac.textAlign='center'; ac.fillText(nd.dead?'✂ '+nd.n:nd.n,x,y+26);
    }
    ac.textAlign='left';
    document.getElementById('b_dopv').textContent=dop.toFixed(2);
    document.getElementById('b_score').textContent=c.score;
  }
  return {init,step,draw};
})();

// ---------------------------------------------------------------------------
// 5. PUZZLE MODE
// ---------------------------------------------------------------------------
modes.puzzle = (()=>{
  let c, goal, won, sensorGain, motorGain, turnBias, t0, brokenGenome;
  function init(){
    // deliberately mis-tuned brain: weak, biased. Player fixes it with 3 sliders.
    brokenGenome={ w:[0.05,0.4,0.4,0.05,-0.3,0.3], b:[0.4,0.05] };
    c=makeCreature({w:brokenGenome.w.slice(),b:brokenGenome.b.slice()});
    c.x=0.1; c.y=0.5; c.h=0;
    goal={x:0.88,y:0.5}; won=false; sensorGain=1; motorGain=1; turnBias=0; t0=performance.now();
    panel.innerHTML=`<div class="mname">5 · Puzzle Mode</div>
     <div class="mdesc">This brain is mis-tuned and drifts in circles. Only three dials are unlocked. Find settings that make it reach the blue goal. Each level would unlock one mechanism at a time.</div>
     <div class="lab">Sensor gain <span class="val" id="p_sv">1.0</span></div><input type="range" id="p_sg" min="0" max="40" value="10">
     <div class="lab">Motor gain <span class="val" id="p_mv">1.0</span></div><input type="range" id="p_mg" min="0" max="40" value="10">
     <div class="lab">Turn-bias trim <span class="val" id="p_tv">0.00</span></div><input type="range" id="p_tg" min="-40" max="40" value="0">
     <button id="p_reset">Reset creature</button>
     <div class="potential">Potential: <span class="star">★★★☆☆</span> — good teaching scaffold and clear win-state, but authored levels are a lot of content work for replay value.</div>
     <div class="hint">Goal: get the creature to the blue circle. Hint: it under-steers and pulls to one side.</div>`;
    document.getElementById('p_sg').oninput=e=>{ sensorGain=+e.target.value/10; document.getElementById('p_sv').textContent=sensorGain.toFixed(1); };
    document.getElementById('p_mg').oninput=e=>{ motorGain=+e.target.value/10; document.getElementById('p_mv').textContent=motorGain.toFixed(1); };
    document.getElementById('p_tg').oninput=e=>{ turnBias=+e.target.value/1000; document.getElementById('p_tv').textContent=turnBias.toFixed(3); };
    document.getElementById('p_reset').onclick=()=>{ c.x=0.1;c.y=0.5;c.h=0;won=false;t0=performance.now(); };
  }
  function step(){
    if(won) return;
    stepCreature(c,[goal],{sensorGain,motorGain,turnBias});
    const dx=goal.x-c.x,dy=goal.y-c.y; if(dx*dx+dy*dy<0.002) won=true;
  }
  function draw(){
    const [w,h]=frameClear();
    ac.strokeStyle='#5aa8ff'; ac.lineWidth=2; ac.beginPath(); ac.arc(goal.x*w,goal.y*h,12,0,6.283); ac.stroke(); ac.lineWidth=1;
    drawBody(c,w,h);
    if(won){ ac.fillStyle='rgba(5,8,13,0.72)'; ac.fillRect(0,0,w,h); ac.fillStyle='#3ddc84'; ac.font='bold 26px system-ui'; ac.textAlign='center'; ac.fillText('✅ solved!',w/2,h/2-6); ac.fillStyle='#eaf1fb'; ac.font='14px system-ui'; ac.fillText('in '+((performance.now()-t0)/1000).toFixed(1)+'s',w/2,h/2+18); ac.textAlign='left'; }
  }
  return {init,step,draw};
})();

// ---------------------------------------------------------------------------
// 6. COLLECTION & IDENTITY
// ---------------------------------------------------------------------------
modes.collection = (()=>{
  let c, food, seed, name, saved, evalTicks;
  const NAMES=['Bloop','Ziggy','Mochi','Vex','Pip','Noodle','Quark','Gizmo','Tato','Wisp','Bolt','Fen'];
  function seededGenome(s){ // pseudo-random from seed for reproducibility
    let x=s; const r=()=>{ x=(x*1103515245+12345)&0x7fffffff; return x/0x7fffffff; };
    return { w:[r()*2-1,r()*2-1,r()*2-1,r()*2-1,r()*2-1,r()*2-1], b:[r()-.5,r()-.5] };
  }
  function newBrain(s){
    seed=s==null?Math.floor(Math.random()*99999):s;
    name=NAMES[seed%NAMES.length]+'-'+seed;
    c=makeCreature(seededGenome(seed)); food=[]; for(let i=0;i<6;i++)food.push(spawnFood()); evalTicks=0;
    render();
  }
  function personality(){
    if(c.ticks<30) return 'observing…';
    const turn=c.turnSum/c.ticks, wall=c.wallTime/c.ticks, sp=c.score/Math.max(1,c.ticks/300);
    if(wall>0.4) return '🧱 Wall-hugger';
    if(turn>0.35) return '🌀 Spinner';
    if(sp>0.9) return '⚡ Greedy darter';
    if(turn<0.12) return '➡️ Straight-liner';
    return '🍃 Cautious wanderer';
  }
  function saveIt(){ saved.push({name,seed,score:c.score,trait:personality()}); render(); }
  function render(){
    panel.innerHTML=`<div class="mname">6 · Collection & Identity</div>
     <div class="mdesc">Every seed is a reproducible brain with a name and an emergent "personality" read from how it behaves. Roll brains, keep favorites, share seeds.</div>
     <div class="vit"><span class="vk">Name</span><span class="vv">${name}</span></div>
     <div class="vit"><span class="vk">Seed</span><span class="vv">${seed}</span></div>
     <div class="vit"><span class="vk">Personality</span><span class="vv" id="k_trait">…</span></div>
     <div class="vit"><span class="vk">Food eaten</span><span class="vv" id="k_score">0</span></div>
     <button id="k_new">🎲 Roll new brain</button>
     <button id="k_save">⭐ Save to collection</button>
     <div class="potential">Potential: <span class="star">★★★★☆</span> — cheap to build, high shareability ("seed 4471 is a chaotic spinner"). Best as a layer on top of another mode, not standalone.</div>
     <div class="list" id="k_list"></div>`;
    document.getElementById('k_new').onclick=()=>newBrain();
    document.getElementById('k_save').onclick=saveIt;
    const list=document.getElementById('k_list');
    list.innerHTML = saved.length? saved.map(s=>`<div class="item"><span>⭐ ${s.name}</span><span>${s.trait} · ${s.score}🍽</span></div>`).join('') : '<div class="hint">No saved brains yet. Roll a few and star the interesting ones.</div>';
  }
  function init(){ saved=[]; newBrain(); }
  function step(){ stepCreature(c,food,{}); eatCheck(c,food); c.energy=100; evalTicks++; }
  function draw(){
    const [w,h]=frameClear();
    drawFood(food,w,h); drawBody(c,w,h);
    const tr=document.getElementById('k_trait'); if(tr) tr.textContent=personality();
    const sc=document.getElementById('k_score'); if(sc) sc.textContent=c.score;
  }
  return {init,step,draw};
})();
